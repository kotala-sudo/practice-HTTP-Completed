<div class="container my-3">
  <div class="row my-3">
    <div class="card text-bg-info p-5">
      @if(post(); as p){
      <h3 class="card-title">{{ p.id }}: {{ p.title }}</h3>
      <div class="card-body">
        <p>User ID: {{ p.userId }}</p>
        <p>{{ p.body }}</p>
      </div>
      }
      <a routerLink="">Go Back to Home</a>
    </div>
  </div>
</div>
